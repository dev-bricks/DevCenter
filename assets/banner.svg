<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="100%" role="img" aria-label="DevCenter Banner">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030712"/>
      <stop offset="50%" style="stop-color:#080f1e"/>
      <stop offset="100%" style="stop-color:#030712"/>
    </linearGradient>

    <!-- Badge Background Gradient -->
    <linearGradient id="badge-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00E5FF; stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#0052FF; stop-opacity:0.15"/>
    </linearGradient>

    <!-- Text Wordmark Gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="60%" style="stop-color:#f1f5f9"/>
      <stop offset="100%" style="stop-color:#00E5FF"/>
    </linearGradient>

    <!-- Accent Divider Line Gradient -->
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00E5FF; stop-opacity:0.85"/>
      <stop offset="40%" style="stop-color:#0052FF; stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#0052FF; stop-opacity:0"/>
    </linearGradient>

    <!-- Gear Gradients -->
    <linearGradient id="gear-grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2979FF"/>
      <stop offset="100%" style="stop-color:#0052FF"/>
    </linearGradient>
    
    <linearGradient id="gear-grad-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF"/>
      <stop offset="100%" style="stop-color:#00B0FF"/>
    </linearGradient>

    <!-- Filters for Glow & Shadows -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow-light" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <filter id="blur-bg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#00E5FF" fill-opacity="0.12"/>
    </pattern>

    <radialGradient id="grid-fade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="1.0" />
      <stop offset="70%" stop-color="white" stop-opacity="0.5" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
    
    <mask id="grid-mask">
      <rect width="1200" height="340" fill="url(#grid-fade)" />
    </mask>

    <!-- Gear Masks -->
    <mask id="gear-mask">
      <rect x="-40" y="-40" width="80" height="80" fill="white"/>
      <circle cx="0" cy="0" r="10" fill="black"/>
    </mask>

    <mask id="gear-small-mask">
      <rect x="-30" y="-30" width="60" height="60" fill="white"/>
      <circle cx="0" cy="0" r="7" fill="black"/>
    </mask>

    <mask id="gear-med-mask">
      <rect x="-35" y="-35" width="70" height="70" fill="white"/>
      <circle cx="0" cy="0" r="8" fill="black"/>
    </mask>
  </defs>

  <!-- Solid Background Card (guarantees dark mode style on all GH themes) -->
  <rect x="0" y="0" width="1200" height="340" fill="url(#bg-gradient)"/>

  <!-- High-tech Radial Backlight Glows -->
  <circle cx="260" cy="170" r="180" fill="#0052ff" fill-opacity="0.18" filter="url(#blur-bg)"/>
  <circle cx="700" cy="170" r="220" fill="#00e5ff" fill-opacity="0.08" filter="url(#blur-bg)"/>

  <!-- Subtle Faded Tech Grid Overlay -->
  <rect width="1200" height="340" fill="url(#grid)" mask="url(#grid-mask)"/>

  <!-- ==================== LEFT GRAPHIC: COMMAND CENTER (x:80..460) ==================== -->

  <!-- Connected Nodes Network: Underlay Connection Lines -->
  <!-- Outer Web Ring -->
  <line x1="90" y1="140" x2="115" y2="90" stroke="#00E5FF" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="115" y1="90" x2="160" y2="75" stroke="#00E5FF" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="160" y1="75" x2="420" y2="80" stroke="#00E5FF" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="420" y1="80" x2="450" y2="160" stroke="#00E5FF" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="450" y1="160" x2="415" y2="255" stroke="#00E5FF" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="415" y1="255" x2="300" y2="275" stroke="#00E5FF" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="300" y1="275" x2="100" y2="270" stroke="#00E5FF" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="100" y1="270" x2="90" y2="140" stroke="#00E5FF" stroke-width="1.2" stroke-opacity="0.35"/>

  <!-- Inner Web Cross-Connections (Circuit style) -->
  <line x1="115" y1="90" x2="165" y2="110" stroke="#00E5FF" stroke-width="1.0" stroke-opacity="0.15" stroke-dasharray="2 2"/>
  <line x1="420" y1="80" x2="385" y2="110" stroke="#00E5FF" stroke-width="1.0" stroke-opacity="0.15" stroke-dasharray="2 2"/>
  <line x1="415" y1="255" x2="385" y2="250" stroke="#00E5FF" stroke-width="1.0" stroke-opacity="0.15" stroke-dasharray="2 2"/>
  <line x1="300" y1="275" x2="300" y2="250" stroke="#00E5FF" stroke-width="1.0" stroke-opacity="0.15" stroke-dasharray="2 2"/>
  <line x1="90" y1="140" x2="165" y2="170" stroke="#00E5FF" stroke-width="1.0" stroke-opacity="0.15" stroke-dasharray="2 2"/>
  <line x1="450" y1="160" x2="385" y2="180" stroke="#00E5FF" stroke-width="1.0" stroke-opacity="0.15" stroke-dasharray="2 2"/>

  <!-- Connection to Right Wordmark Divider -->
  <path d="M 450 160 L 475 160 L 485 180" fill="none" stroke="#00E5FF" stroke-width="1.2" stroke-opacity="0.3" stroke-dasharray="3 3"/>

  <!-- Large Stylized Vector Code Brackets (Behind Terminal) -->
  <!-- Left Bracket < -->
  <path d="M 145 100 L 110 180 L 145 260" fill="none" stroke="#00E5FF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.25"/>
  <!-- Right Bracket > -->
  <path d="M 405 100 L 440 180 L 405 260" fill="none" stroke="#00E5FF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.25"/>

  <!-- Glassmorphic Terminal Window -->
  <rect x="165" y="110" width="220" height="140" rx="10" fill="#070c17" fill-opacity="0.88" stroke="#00E5FF" stroke-width="1.5" stroke-opacity="0.75" filter="url(#shadow)"/>
  
  <!-- Terminal Header Bar Line -->
  <line x1="165" y1="135" x2="385" y2="135" stroke="#1e293b" stroke-width="1"/>
  
  <!-- Terminal Window Control Buttons -->
  <circle cx="185" cy="122" r="4.5" fill="#ff5f56"/>
  <circle cx="197" cy="122" r="4.5" fill="#ffbd2e"/>
  <circle cx="209" cy="122" r="4.5" fill="#27c93f"/>
  
  <!-- Terminal Title -->
  <text x="275" y="126" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b" font-weight="600" text-anchor="middle" letter-spacing="0.5px">terminal</text>

  <!-- Terminal Content (Monospace Code) -->
  <text x="185" y="160" font-family="Consolas, 'Fira Code', monospace" font-size="12" fill="#00E5FF" font-weight="bold">> dc.init_hub()</text>
  <text x="185" y="182" font-family="Consolas, 'Fira Code', monospace" font-size="11" fill="#34d399">  [OK] DevCenter Engine v1.0</text>
  <text x="185" y="202" font-family="Consolas, 'Fira Code', monospace" font-size="11" fill="#60a5fa">  [SYS] Monitoring 8 Nodes...</text>
  <text x="185" y="224" font-family="Consolas, 'Fira Code', monospace" font-size="12" fill="#a78bfa">  $_</text>

  <!-- Interlocking Gears (Command center machinery) -->
  
  <!-- Gear 2 (Left-Bottom, Medium-Small, Blue-cyan) -->
  <g transform="translate(110, 200)">
    <g id="gear-small" fill="url(#gear-grad-blue)" fill-opacity="0.8">
      <g mask="url(#gear-small-mask)">
        <circle cx="0" cy="0" r="15"/>
        <path d="M -4 -14 L -2.5 -20 L 2.5 -20 L 4 -14 Z"/>
        <path d="M -4 -14 L -2.5 -20 L 2.5 -20 L 4 -14 Z" transform="rotate(45)"/>
        <path d="M -4 -14 L -2.5 -20 L 2.5 -20 L 4 -14 Z" transform="rotate(90)"/>
        <path d="M -4 -14 L -2.5 -20 L 2.5 -20 L 4 -14 Z" transform="rotate(135)"/>
        <path d="M -4 -14 L -2.5 -20 L 2.5 -20 L 4 -14 Z" transform="rotate(180)"/>
        <path d="M -4 -14 L -2.5 -20 L 2.5 -20 L 4 -14 Z" transform="rotate(225)"/>
        <path d="M -4 -14 L -2.5 -20 L 2.5 -20 L 4 -14 Z" transform="rotate(270)"/>
        <path d="M -4 -14 L -2.5 -20 L 2.5 -20 L 4 -14 Z" transform="rotate(315)"/>
      </g>
    </g>
  </g>

  <!-- Gear 1 (Bottom, Large, Electric Blue) -->
  <g transform="translate(140, 235)">
    <g id="gear-large" fill="url(#gear-grad-cyan)" fill-opacity="0.85" filter="url(#glow-light)">
      <g mask="url(#gear-mask)">
        <circle cx="0" cy="0" r="22"/>
        <path d="M -5 -20 L -3.5 -28 L 3.5 -28 L 5 -20 Z"/>
        <path d="M -5 -20 L -3.5 -28 L 3.5 -28 L 5 -20 Z" transform="rotate(45)"/>
        <path d="M -5 -20 L -3.5 -28 L 3.5 -28 L 5 -20 Z" transform="rotate(90)"/>
        <path d="M -5 -20 L -3.5 -28 L 3.5 -28 L 5 -20 Z" transform="rotate(135)"/>
        <path d="M -5 -20 L -3.5 -28 L 3.5 -28 L 5 -20 Z" transform="rotate(180)"/>
        <path d="M -5 -20 L -3.5 -28 L 3.5 -28 L 5 -20 Z" transform="rotate(225)"/>
        <path d="M -5 -20 L -3.5 -28 L 3.5 -28 L 5 -20 Z" transform="rotate(270)"/>
        <path d="M -5 -20 L -3.5 -28 L 3.5 -28 L 5 -20 Z" transform="rotate(315)"/>
      </g>
    </g>
  </g>

  <!-- Gear 3 (Top-Right, Medium, Blue-cyan) -->
  <g transform="translate(375, 95)">
    <g id="gear-medium" fill="url(#gear-grad-blue)" fill-opacity="0.75">
      <g mask="url(#gear-med-mask)">
        <circle cx="0" cy="0" r="18"/>
        <path d="M -4.5 -17 L -3 -24 L 3 -24 L 4.5 -17 Z"/>
        <path d="M -4.5 -17 L -3 -24 L 3 -24 L 4.5 -17 Z" transform="rotate(45)"/>
        <path d="M -4.5 -17 L -3 -24 L 3 -24 L 4.5 -17 Z" transform="rotate(90)"/>
        <path d="M -4.5 -17 L -3 -24 L 3 -24 L 4.5 -17 Z" transform="rotate(135)"/>
        <path d="M -4.5 -17 L -3 -24 L 3 -24 L 4.5 -17 Z" transform="rotate(180)"/>
        <path d="M -4.5 -17 L -3 -24 L 3 -24 L 4.5 -17 Z" transform="rotate(225)"/>
        <path d="M -4.5 -17 L -3 -24 L 3 -24 L 4.5 -17 Z" transform="rotate(270)"/>
        <path d="M -4.5 -17 L -3 -24 L 3 -24 L 4.5 -17 Z" transform="rotate(315)"/>
      </g>
    </g>
  </g>

  <!-- Gear 4 (Top-Right-Edge, Small, Electric Blue) -->
  <g transform="translate(405, 120)">
    <g id="gear-mini" fill="url(#gear-grad-cyan)" fill-opacity="0.85" filter="url(#glow-light)">
      <g mask="url(#gear-small-mask)">
        <circle cx="0" cy="0" r="15"/>
        <path d="M -4 -14 L -2.5 -20 L 2.5 -20 L 4 -14 Z"/>
        <path d="M -4 -14 L -2.5 -20 L 2.5 -20 L 4 -14 Z" transform="rotate(45)"/>
        <path d="M -4 -14 L -2.5 -20 L 2.5 -20 L 4 -14 Z" transform="rotate(90)"/>
        <path d="M -4 -14 L -2.5 -20 L 2.5 -20 L 4 -14 Z" transform="rotate(135)"/>
        <path d="M -4 -14 L -2.5 -20 L 2.5 -20 L 4 -14 Z" transform="rotate(180)"/>
        <path d="M -4 -14 L -2.5 -20 L 2.5 -20 L 4 -14 Z" transform="rotate(225)"/>
        <path d="M -4 -14 L -2.5 -20 L 2.5 -20 L 4 -14 Z" transform="rotate(270)"/>
        <path d="M -4 -14 L -2.5 -20 L 2.5 -20 L 4 -14 Z" transform="rotate(315)"/>
      </g>
    </g>
  </g>

  <!-- Glowing Web Nodes (Foreground dots) -->
  <g>
    <!-- Node 1 -->
    <circle cx="115" cy="90" r="8" fill="#00E5FF" fill-opacity="0.25" filter="url(#glow)"/>
    <circle cx="115" cy="90" r="3.5" fill="#00E5FF"/>
    <circle cx="115" cy="90" r="1.5" fill="#ffffff"/>

    <!-- Node 2 -->
    <circle cx="160" cy="75" r="8" fill="#00E5FF" fill-opacity="0.25" filter="url(#glow)"/>
    <circle cx="160" cy="75" r="3.5" fill="#00E5FF"/>
    <circle cx="160" cy="75" r="1.5" fill="#ffffff"/>

    <!-- Node 3 -->
    <circle cx="420" cy="80" r="8" fill="#0052FF" fill-opacity="0.25" filter="url(#glow)"/>
    <circle cx="420" cy="80" r="3.5" fill="#0052FF"/>
    <circle cx="420" cy="80" r="1.5" fill="#ffffff"/>

    <!-- Node 4 -->
    <circle cx="450" cy="160" r="8" fill="#00E5FF" fill-opacity="0.25" filter="url(#glow)"/>
    <circle cx="450" cy="160" r="3.5" fill="#00E5FF"/>
    <circle cx="450" cy="160" r="1.5" fill="#ffffff"/>

    <!-- Node 5 -->
    <circle cx="415" cy="255" r="8" fill="#0052FF" fill-opacity="0.25" filter="url(#glow)"/>
    <circle cx="415" cy="255" r="3.5" fill="#0052FF"/>
    <circle cx="415" cy="255" r="1.5" fill="#ffffff"/>

    <!-- Node 6 -->
    <circle cx="300" cy="275" r="8" fill="#00E5FF" fill-opacity="0.25" filter="url(#glow)"/>
    <circle cx="300" cy="275" r="3.5" fill="#00E5FF"/>
    <circle cx="300" cy="275" r="1.5" fill="#ffffff"/>

    <!-- Node 7 -->
    <circle cx="100" cy="270" r="8" fill="#0052FF" fill-opacity="0.25" filter="url(#glow)"/>
    <circle cx="100" cy="270" r="3.5" fill="#0052FF"/>
    <circle cx="100" cy="270" r="1.5" fill="#ffffff"/>

    <!-- Node 8 -->
    <circle cx="90" cy="140" r="8" fill="#00E5FF" fill-opacity="0.25" filter="url(#glow)"/>
    <circle cx="90" cy="140" r="3.5" fill="#00E5FF"/>
    <circle cx="90" cy="140" r="1.5" fill="#ffffff"/>
  </g>

  <!-- Digital Floating Bits (Decorations) -->
  <text x="125" y="145" font-family="monospace" font-size="11" fill="#00E5FF" fill-opacity="0.25">1</text>
  <text x="350" y="80" font-family="monospace" font-size="11" fill="#00E5FF" fill-opacity="0.25">0</text>
  <text x="435" y="220" font-family="monospace" font-size="11" fill="#00E5FF" fill-opacity="0.2">1</text>
  <text x="150" y="270" font-family="monospace" font-size="11" fill="#00E5FF" fill-opacity="0.2">0</text>

  <!-- ==================== RIGHT SECTION: WORDMARK & CONTENT (x:490..1120) ==================== -->

  <!-- "Developer Hub" Badge -->
  <rect x="490" y="85" width="125" height="22" rx="11" fill="url(#badge-bg)" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.5"/>
  <text x="552.5" y="99" font-family="system-ui, -apple-system, sans-serif" font-size="9.5" font-weight="800" fill="#00E5FF" letter-spacing="1.5px" text-anchor="middle">DEVELOPER HUB</text>

  <!-- Main Wordmark -->
  <text x="490" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="76" font-weight="800" fill="url(#text-grad)" filter="url(#shadow)" letter-spacing="-1.5px">DevCenter</text>

  <!-- Glowing Accent Divider Line -->
  <rect x="490" y="180" width="480" height="2.5" fill="url(#line-grad)"/>

  <!-- Subtitle Tagline -->
  <text x="490" y="212" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="500" fill="#94a3b8" letter-spacing="-0.5px">Local-first <tspan fill="#00E5FF" font-weight="600">Python IDE</tspan> &amp; Developer Hub</text>

  <!-- Key Features Tag List with Glowing Bullets -->
  <g>
    <!-- Editor -->
    <circle cx="496" cy="254" r="3" fill="#00E5FF" filter="url(#glow-light)"/>
    <text x="506" y="259" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#64748b">Editor</text>

    <!-- Analyzer -->
    <circle cx="566" cy="254" r="3" fill="#00E5FF" filter="url(#glow-light)"/>
    <text x="576" y="259" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#64748b">Analyzer</text>

    <!-- Build Suite -->
    <circle cx="648" cy="254" r="3" fill="#00E5FF" filter="url(#glow-light)"/>
    <text x="658" y="259" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#64748b">Build Suite</text>

    <!-- AI Co-Pilot -->
    <circle cx="750" cy="254" r="3" fill="#00E5FF" filter="url(#glow-light)"/>
    <text x="760" y="259" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#64748b">AI Co-Pilot</text>

    <!-- Translation Mgr -->
    <circle cx="854" cy="254" r="3" fill="#00E5FF" filter="url(#glow-light)"/>
    <text x="864" y="259" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#64748b">Translation Mgr</text>
  </g>

  <!-- ==================== FAR RIGHT GRAPHIC: CONNECTIVITY SYMMETRY (x:1010..1120) ==================== -->

  <!-- Small background node network to balance the right side -->
  <line x1="1040" y1="110" x2="1090" y2="150" stroke="#0052FF" stroke-width="1.2" stroke-opacity="0.25"/>
  <line x1="1090" y1="150" x2="1085" y2="240" stroke="#00E5FF" stroke-width="1.2" stroke-opacity="0.25"/>
  <line x1="1085" y1="240" x2="1030" y2="200" stroke="#0052FF" stroke-width="1.2" stroke-opacity="0.25"/>
  <line x1="1030" y1="200" x2="1040" y2="110" stroke="#00E5FF" stroke-width="1.2" stroke-opacity="0.25"/>
  <line x1="1090" y1="150" x2="1030" y2="200" stroke="#00E5FF" stroke-width="0.8" stroke-opacity="0.15" stroke-dasharray="2 2"/>
  <line x1="1040" y1="110" x2="1085" y2="240" stroke="#00E5FF" stroke-width="0.8" stroke-opacity="0.15" stroke-dasharray="2 2"/>

  <!-- Far Right Nodes -->
  <circle cx="1040" cy="110" r="6" fill="#00E5FF" fill-opacity="0.2" filter="url(#glow-light)"/>
  <circle cx="1040" cy="110" r="2.5" fill="#00E5FF" fill-opacity="0.6"/>

  <circle cx="1090" cy="150" r="6" fill="#0052FF" fill-opacity="0.2" filter="url(#glow-light)"/>
  <circle cx="1090" cy="150" r="2.5" fill="#0052FF" fill-opacity="0.6"/>

  <circle cx="1030" cy="200" r="6" fill="#00E5FF" fill-opacity="0.2" filter="url(#glow-light)"/>
  <circle cx="1030" cy="200" r="2.5" fill="#00E5FF" fill-opacity="0.6"/>

  <circle cx="1085" cy="240" r="6" fill="#0052FF" fill-opacity="0.2" filter="url(#glow-light)"/>
  <circle cx="1085" cy="240" r="2.5" fill="#0052FF" fill-opacity="0.6"/>

</svg>
